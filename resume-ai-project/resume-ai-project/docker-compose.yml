version: '3.9'

services:
  # ── Python AI Layer ──────────────────────────────────────────
  ai-service:
    build: ./ai-service
    container_name: resume-ai-service
    ports:
      - "5000:5000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - FLASK_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Spring Boot Backend ──────────────────────────────────────
  backend:
    build: ./backend
    container_name: resume-backend
    ports:
      - "8080:8080"
    environment:
      - AI_SERVICE_URL=http://ai-service:5000
    depends_on:
      ai-service:
        condition: service_healthy

  # ── React Frontend ───────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: resume-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
